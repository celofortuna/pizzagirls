<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4FC3F7">
<title>Pizza Girls Runner 🍕</title>
<style>
/* =================================================================
   UI & LAYOUT (CSS)
   ================================================================= */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#111;
  display:flex; align-items:center; justify-content:center;
  height:100dvh; overflow:hidden;
  font-family:'Segoe UI','Arial Rounded MT Bold',Arial,sans-serif;
  touch-action:none; user-select:none; -webkit-user-select:none;
}

/* O sistema de escala garante que o jogo nunca distorça */
#game-wrap {
  position:absolute;
  left:50%; top:50%;
  transform:translate(-50%, -50%);
  width:1000px; height:600px;
  overflow:hidden;
  transform-origin:center center;
  background:#4FC3F7;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

canvas {
  display:block;
  width:1000px; height:600px;
  image-rendering:auto;
}

/* ── HUD ── */
#hud {
  position:absolute; top:0; left:0; right:0;
  padding:15px 20px;
  display:flex; justify-content:space-between; align-items:flex-start;
  pointer-events:none; z-index:10;
}
.hud-box {
  background:rgba(255,255,255,0.92);
  border-radius:12px; padding:8px 16px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
  display:flex; flex-direction:column; align-items:center; min-width:80px;
}
.hud-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#999; }
.hud-value { font-size:22px; font-weight:900; color:#333; line-height:1.2; }
#hp .hud-value{color:#e67e22;} #hs .hud-value{color:#2980b9;}
#hb .hud-value{color:#8e44ad;} #hv .hud-value{color:#27ae60;}

/* ── SCREENS ── */
.screen {
  position:absolute; inset:0; z-index:30;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; padding:30px;
}
#loading {
  background:linear-gradient(180deg,#4FC3F7 0%,#81D4FA 55%,#A5D6A7 55%,#66BB6A 100%);
  z-index:40;
}
#loading h2 { font-size:32px; font-weight:900; color:#fff; text-shadow:0 3px 0 #e67e22; }
#loading-bar-wrap { width:240px; height:14px; background:rgba(255,255,255,.4); border-radius:20px; overflow:hidden; }
#loading-bar { height:100%; width:0%; background:#fff; border-radius:20px; transition:width .15s ease-out; }

#start-screen {
  background:linear-gradient(180deg,#4FC3F7 0%,#81D4FA 55%,#A5D6A7 55%,#66BB6A 100%);
  display:none;
}
#start-screen h1 {
  font-size:64px; font-weight:900; color:#fff;
  text-shadow:0 4px 0 #e67e22,0 8px 0 rgba(0,0,0,.15);
  text-align:center; letter-spacing:-1px; margin-bottom:10px;
}
#start-screen p {
  font-size:20px; color:#fff;
  text-align:center; font-weight:600; max-width:400px;
  text-shadow:0 2px 5px rgba(0,0,0,.25);
}
.hint { font-size:14px !important; color:rgba(255,255,255,.8) !important; margin-top:10px; }

#gameover-screen {
  background:rgba(0,0,0,.65); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  display:none;
}
#gameover-screen h2 {
  font-size:60px; font-weight:900; color:#fff;
  text-shadow:0 5px 0 #c0392b,0 10px 25px rgba(0,0,0,.4); letter-spacing:-1px;
}
.go-stats {
  background:rgba(255,255,255,.98); border-radius:20px;
  padding:20px 35px; display:flex; flex-direction:column;
  gap:12px; min-width:260px; box-shadow:0 10px 40px rgba(0,0,0,.3);
}
.go-stat { display:flex; justify-content:space-between; align-items:center; gap:25px; }
.go-stat-label { font-size:13px; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:.5px; }
.go-stat-value { font-size:24px; font-weight:900; color:#333; }
.go-stat-value.rec { color:#8e44ad; }
#rec-badge {
  background:linear-gradient(135deg,#f39c12,#e67e22);
  color:#fff; padding:6px 18px; border-radius:20px;
  font-size:13px; font-weight:900; text-transform:uppercase;
  letter-spacing:1px; animation:pulse .6s ease infinite alternate; display:none;
}
@keyframes pulse{to{transform:scale(1.1);}}

/* ── BUTTONS ── */
.btn {
  margin-top:10px;
  background:linear-gradient(135deg,#ff6b35,#f7c59f);
  border:none; border-radius:50px; padding:16px 45px;
  font-size:24px; font-weight:900; color:#fff; cursor:pointer;
  box-shadow:0 6px 0 #c0392b,0 10px 20px rgba(0,0,0,.25);
  transition:transform .1s,box-shadow .1s;
  letter-spacing:1px; text-shadow:0 2px 4px rgba(0,0,0,.2);
  outline:none;
}
.btn:active{transform:translateY(6px);box-shadow:0 0px 0 #c0392b;}

/* ── OVERLAYS ── */
#combo {
  position:absolute; top:110px; left:50%; transform:translateX(-50%);
  font-size:32px; font-weight:900; color:#e67e22;
  text-shadow:0 3px 10px rgba(0,0,0,.25), 0 0 15px rgba(230,126,34,0.5);
  pointer-events:none; opacity:0; transition:opacity .3s; z-index:15; white-space:nowrap;
}
#toast {
  position:absolute; bottom:30px; left:50%;
  transform:translateX(-50%) translateY(100px);
  background:linear-gradient(135deg,#2980b9,#3498db);
  color:#fff; padding:12px 24px; border-radius:30px;
  font-size:16px; font-weight:700; box-shadow:0 5px 20px rgba(0,0,0,.3);
  pointer-events:none; z-index:15; white-space:nowrap;
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="game-wrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="hud-box" id="hp"><span class="hud-label">Pizzas</span><span class="hud-value" id="hp-v">🍕 0</span></div>
    <div class="hud-box" id="hs"><span class="hud-label">Pontos</span><span class="hud-value" id="hs-v">0</span></div>
    <div class="hud-box" id="hb"><span class="hud-label">Recorde</span><span class="hud-value" id="hb-v">0</span></div>
    <div class="hud-box" id="hv"><span class="hud-label">Vel.</span><span class="hud-value" id="hv-v">1.0x</span></div>
  </div>

  <div id="combo">COMBO x2 🔥</div>
  <div id="toast">🎯 Colete 20 pizzas!</div>

  <div id="loading" class="screen">
    <h2>🍕 Carregando…</h2>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <div id="start-screen" class="screen">
    <h1>🍕 Pizza Girls</h1>
    <p>Corra, colete pizzas e desvie dos obstáculos!</p>
    <button class="btn" id="btn-start">Jogar!</button>
    <p class="hint">Toque • Espaço • ↑ para pular</p>
  </div>

  <div id="gameover-screen" class="screen">
    <h2>💥 Game Over</h2>
    <div id="rec-badge">⭐ NOVO RECORDE!</div>
    <div class="go-stats">
      <div class="go-stat"><span class="go-stat-label">Pontuação</span><span class="go-stat-value" id="go-s">0</span></div>
      <div class="go-stat"><span class="go-stat-label">Pizzas</span><span class="go-stat-value" id="go-p">0 🍕</span></div>
      <div class="go-stat"><span class="go-stat-label">Recorde</span><span class="go-stat-value rec" id="go-b">0</span></div>
    </div>
    <button class="btn" id="btn-restart">Jogar de novo!</button>
  </div>
</div>

<script>
/* =================================================================
   PIZZA GIRLS RUNNER - REFACTORED ENGINE
   - Fixed Resolution & Perfect Scaling
   - Unified Baseline (Ground Y)
   - Independent Hitboxes & Offsets
   - True Parallax Scrolling
   - Optimized Rendering & Object Pooling
   ================================================================= */

// ── 1. CONFIG & RESOLUTION ───────────────────────────────────────
const W = 1000;
const H = 600;
const BASELINE = 450; // Linha única de chão (Y absoluto onde pés tocam)

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false }); // Otimização
canvas.width = W;
canvas.height = H;

// Escalamento Responsivo CSS
function resize() {
  const wrap = document.getElementById('game-wrap');
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  wrap.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('resize', resize);
resize();

// ── 2. ASSETS & SPRITES ──────────────────────────────────────────
// Define tamanhos fixos independentes do PNG original e compensa áreas transparentes.
const SPRITES = {
  cart:   { w: 126, h: 105, ox: 0, oy: 0 },
  pizza:  { w: 48,  h: 48,  ox: 0, oy: 0 },
  house0: { w: 170, h: 170, ox: 0, oy: 0 },
  house1: { w: 150, h: 170, ox: 0, oy: 0 },
  tree:   { w: 100, h: 150, ox: 0, oy: 15 }, // offsetY ajusta raiz pro chão
  bush:   { w: 80,  h: 70,  ox: 0, oy: 5 },
  fence:  { w: 80,  h: 75,  ox: 0, oy: 5 },
  cloud:  { w: 140, h: 80,  ox: 0, oy: 0 },
  ground: { w: W,   h: H - BASELINE, ox: 0, oy: 0 }
};

const ASSET_URLS = {
  sky:    'https://res.cloudinary.com/daorgqz6p/image/upload/v1782594400/Design_sem_nome_5_ccxlcf.png',
  cloud:  'https://res.cloudinary.com/daorgqz6p/image/upload/v1782593699/Design_sem_nome_7_ddvkga.png',
  house0: 'https://res.cloudinary.com/daorgqz6p/image/upload/v1782593700/Design_sem_nome_1_ditnqc.png',
  house1: 'https://res.cloudinary.com/daorgqz6p/image/upload/v1782593701/Design_sem_nome_cwzlpp.png',
  ground: 'https://res.cloudinary.com/daorgqz6p/image/upload/v1782593699/Design_sem_nome_4_jjvk9b.png',
  tree:   'https://res.cloudinary.com/daorgqz6p/image/upload/v1782594288/Design_sem_nome_9_sgapp7.png',
  bush:   'https://res.cloudinary.com/daorgqz6p/image/upload/v1782594288/Design_sem_nome_8_xhlc68.png',
  fence:  'https://res.cloudinary.com/daorgqz6p/image/upload/v1782593700/Design_sem_nome_3_rygifz.png',
  pizza:  'https://res.cloudinary.com/daorgqz6p/image/upload/v1782593700/Design_sem_nome_2_svzsmd.png',
  cart:   'https://res.cloudinary.com/daorgqz6p/image/upload/v1782590921/Design_sem_nome_bz5lqi.png',
};

const IMG = {};

function loadAllAssets() {
  return new Promise(resolve => {
    const keys = Object.keys(ASSET_URLS);
    let loaded = 0;
    const bar = document.getElementById('loading-bar');
    keys.forEach(k => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = img.onerror = () => {
        loaded++;
        bar.style.width = `${(loaded / keys.length) * 100}%`;
        if (loaded === keys.length) resolve();
      };
      img.src = ASSET_URLS[k];
      IMG[k] = img;
    });
  });
}

// ── 3. STATE & PARALLAX ──────────────────────────────────────────
let state = 'loading'; // loading | start | playing | dead
let score = 0, bestScore = parseInt(localStorage.getItem('pgBest')||'0');
let pizzaCount = 0, pizzaTotal = 0;
let speedMult = 1, speedLevel = 1;
let gameTime = 0, cameraX = 0;
let camShake = 0, camZoom = 1;
let combo = 0, comboTimer = 0;

const PARALLAX = { cloud: 0.15, house: 0.35, tree: 0.65, ground: 1, ob: 1 };
const BASE_SPEED = 350; // pixels por segundo
const GRAVITY = 2400;
const JUMP_VEL = -850;

// ── 4. ENTITIES ──────────────────────────────────────────────────
let clouds=[], houses=[], trees=[], obstacles=[], pizzas=[], particles=[], popups=[];

const player = {
  x: 120, y: BASELINE, vy: 0,
  onGround: true, squish: 1, tilt: 0,
  getHitbox: function() {
    // Hitbox menor que o sprite para perdoar o jogador
    return { x: this.x + 25, y: this.y - SPRITES.cart.h + 20, w: 75, h: 75 };
  }
};

const MISSIONS = [
  { desc:'Colete 20 pizzas!',      target:20, prop:'pizzaTotal', done:false },
  { desc:'Alcance velocidade 3x!', target:3,  prop:'speedLevel', done:false },
  { desc:'Colete 50 pizzas!',      target:50, prop:'pizzaTotal', done:false },
];
let missionIdx = 0;

// ── 5. SCENERY & SPAWNERS ────────────────────────────────────────
function initScenery() {
  clouds=[]; houses=[]; trees=[];
  for(let i=0; i<6; i++) spawnCloud(i * 200);
  for(let i=0; i<5; i++) spawnHouse(i * 300);
  for(let i=0; i<6; i++) spawnTree(i * 250 + 100);
}

function spawnCloud(x) { clouds.push({ x: x + Math.random()*100, y: 30 + Math.random()*100 }); }
function spawnHouse(x) { houses.push({ x: x + Math.random()*50, key: Math.random()<0.5?'house0':'house1' }); }
function spawnTree(x) { trees.push({ x: x + Math.random()*100 }); }

function spawnObstacle(forceX = null) {
  const lastX = obstacles.length ? obstacles[obstacles.length-1].x : cameraX + W;
  const gap = Math.max(350, 600 - (speedMult * 40)) * (0.8 + Math.random() * 0.6);
  const type = Math.random() < 0.5 ? 'bush' : 'fence';
  obstacles.push({
    x: forceX || (lastX + gap),
    type: type,
    getHitbox: function() {
      const s = SPRITES[this.type];
      // Hitbox centralizado, compensando bordas
      return { x: this.x + 15, y: BASELINE - s.h + 15, w: s.w - 30, h: s.h - 15 };
    }
  });
}

function spawnPizza(forceX = null) {
  const lastX = obstacles.length ? obstacles[obstacles.length-1].x : cameraX + W;
  const isAir = Math.random() < 0.4;
  pizzas.push({
    x: forceX || (lastX + 150 + Math.random() * 200),
    y: BASELINE - (isAir ? 180 : 20),
    collected: false,
    phase: Math.random() * Math.PI * 2
  });
}

// ── 6. EFFECTS & AUDIO ───────────────────────────────────────────
function spawnParticles(x, y, color, n, spd) {
  for (let i=0; i<n; i++) {
    const a = (Math.PI*2*i/n) + Math.random()*0.5;
    particles.push({
      x, y, vx: Math.cos(a)*spd*(0.5+Math.random()), vy: Math.sin(a)*spd*(0.5+Math.random()) - 50,
      life: 1, decay: 0.02 + Math.random()*0.03, size: 4 + Math.random()*6, color
    });
  }
}

function spawnPopup(x, y, text, color='#fff') {
  popups.push({ x, y, text, color, life:1, vy:-80 });
}

const AC = new (window.AudioContext || window.webkitAudioContext)();
const unlockAC = () => { if(AC.state==='suspended') AC.resume(); };
function beep(type, f0, f1, dur, vol) {
  if (AC.state !== 'running') return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination); o.type=type;
  o.frequency.setValueAtTime(f0, AC.currentTime);
  if(f1!==f0) o.frequency.exponentialRampToValueAtTime(f1, AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.start(); o.stop(AC.currentTime+dur);
}
const sndJump    = () => beep('sine', 260, 560, 0.14, 0.2);
const sndHit     = () => beep('sawtooth', 140, 50, 0.3, 0.3);
const sndCollect = () => { beep('triangle',520,660,0.1,0.15); setTimeout(()=>beep('triangle',780,780,0.1,0.15),80); };
const sndRecord  = () => { beep('sine',523,659,0.15,0.2); setTimeout(()=>beep('sine',784,1047,0.2,0.2),100); };

// ── 7. GAME LOGIC ────────────────────────────────────────────────
function resetGame() {
  score=0; pizzaCount=0; pizzaTotal=0; speedMult=1; speedLevel=1;
  gameTime=0; cameraX=0; combo=0; comboTimer=0; camShake=0; camZoom=1;
  player.y = BASELINE; player.vy = 0; player.onGround = true; player.tilt = 0; player.squish = 1;
  obstacles=[]; pizzas=[]; particles=[]; popups=[];
  MISSIONS.forEach(m=>m.done=false); missionIdx=0;
  
  document.getElementById('combo').style.opacity = '0';
  document.getElementById('toast').classList.remove('show');
  
  initScenery();
  for(let i=0; i<4; i++) spawnObstacle(W + i*400);
  for(let i=0; i<3; i++) spawnPizza(W + 200 + i*400);

  showToast('🎯 ' + MISSIONS[0].desc, 800);
  state = 'playing';
}

function jump() {
  if (state !== 'playing') return;
  if (player.onGround) {
    player.vy = JUMP_VEL; player.onGround = false; player.squish = 1.3;
    sndJump();
  }
}

function triggerDead() {
  if (state !== 'playing') return;
  state = 'dead';
  sndHit(); camShake = 0.8;
  spawnParticles(player.x + SPRITES.cart.w/2, player.y - SPRITES.cart.h/2, '#e74c3c', 25, 300);
  
  const isRec = score > bestScore;
  if (isRec) { bestScore = score; localStorage.setItem('pgBest', Math.floor(bestScore)); sndRecord(); }
  
  document.getElementById('go-s').textContent = Math.floor(score).toLocaleString();
  document.getElementById('go-p').textContent = pizzaCount + ' 🍕';
  document.getElementById('go-b').textContent = Math.floor(bestScore).toLocaleString();
  document.getElementById('rec-badge').style.display = isRec ? 'block' : 'none';
  setTimeout(() => document.getElementById('gameover-screen').style.display='flex', 800);
}

function checkMissions() {
  if (missionIdx >= MISSIONS.length) return;
  const m = MISSIONS[missionIdx];
  const v = m.prop === 'pizzaTotal' ? pizzaTotal : speedLevel;
  if (v >= m.target && !m.done) {
    m.done = true; missionIdx++;
    showToast('✅ ' + m.desc + ' Concluído!');
    if (missionIdx < MISSIONS.length) showToast('🎯 ' + MISSIONS[missionIdx].desc, 3400);
  }
}

function showToast(txt, delay=0) {
  const el = document.getElementById('toast');
  setTimeout(() => {
    el.textContent = txt; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }, delay);
}

function rectOverlap(r1, r2) {
  return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
         r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
}

// ── 8. RENDER ENGINE ─────────────────────────────────────────────
function drawSprite(imgKey, x, y, alignBottom=true) {
  const s = SPRITES[imgKey];
  const img = IMG[imgKey];
  const drawX = x + s.ox;
  const drawY = alignBottom ? y - s.h + s.oy : y + s.oy;
  if (img && img.naturalWidth) {
    ctx.drawImage(img, drawX, drawY, s.w, s.h);
  }
}

function render(dt) {
  // Bg Fill & Sky
  ctx.fillStyle = '#4FC3F7'; ctx.fillRect(0,0,W,H);
  if(IMG.sky && IMG.sky.naturalWidth) ctx.drawImage(IMG.sky,0,0,W,H);

  // Parallax Layers
  const cx = cameraX;

  // Clouds
  clouds.forEach(c => {
    const rX = ((c.x - cx * PARALLAX.cloud) % (W + 200) + (W + 200)) % (W + 200) - 100;
    drawSprite('cloud', rX, c.y, false);
  });

  // Houses
  houses.forEach(h => {
    const rX = ((h.x - cx * PARALLAX.house) % (W * 2) + (W * 2)) % (W * 2) - 200;
    drawSprite(h.key, rX, BASELINE, true);
  });

  // Trees
  trees.forEach(t => {
    const rX = ((t.x - cx * PARALLAX.tree) % (W * 1.5) + (W * 1.5)) % (W * 1.5) - 150;
    drawSprite('tree', rX, BASELINE, true);
  });

  // Ground Loop
  const gOff = (cx * PARALLAX.ground) % W;
  if (IMG.ground && IMG.ground.naturalWidth) {
    ctx.drawImage(IMG.ground, -gOff, BASELINE, W, H - BASELINE);
    ctx.drawImage(IMG.ground, W - gOff, BASELINE, W, H - BASELINE);
  } else {
    ctx.fillStyle = '#66BB6A'; ctx.fillRect(0, BASELINE, W, H - BASELINE);
    ctx.fillStyle = '#795548'; ctx.fillRect(0, BASELINE+40, W, H - BASELINE - 40);
  }

  // Obstacles
  obstacles.forEach(ob => {
    const rX = ob.x - cx * PARALLAX.ob;
    if(rX > -100 && rX < W + 100) drawSprite(ob.type, rX, BASELINE, true);
  });

  // Pizzas
  pizzas.forEach(pz => {
    if(pz.collected) return;
    const rX = pz.x - cx * PARALLAX.ob;
    if(rX > -100 && rX < W + 100) {
      pz.phase += dt * 4;
      const bob = Math.sin(pz.phase) * 12;
      const rot = Math.sin(pz.phase * 0.5) * 0.2;
      ctx.save();
      ctx.translate(rX + SPRITES.pizza.w/2, pz.y + bob);
      ctx.rotate(rot);
      ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(243,156,18,0.8)';
      if (IMG.pizza && IMG.pizza.naturalWidth) {
        ctx.drawImage(IMG.pizza, -SPRITES.pizza.w/2, -SPRITES.pizza.h/2, SPRITES.pizza.w, SPRITES.pizza.h);
      }
      ctx.restore();
    }
  });

  // Player Shadow
  const airH = BASELINE - player.y;
  const shadowScale = Math.max(0.3, 1 - (airH / 200));
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(player.x + SPRITES.cart.w/2, BASELINE + 10, (SPRITES.cart.w/2.5) * shadowScale, 6 * shadowScale, 0, 0, Math.PI*2);
  ctx.fill();

  // Player Cart
  ctx.save();
  ctx.translate(player.x + SPRITES.cart.w/2, player.y - SPRITES.cart.h/2);
  ctx.rotate(player.tilt);
  ctx.scale(1, player.squish);
  if (IMG.cart && IMG.cart.naturalWidth) {
    ctx.drawImage(IMG.cart, -SPRITES.cart.w/2, -SPRITES.cart.h/2, SPRITES.cart.w, SPRITES.cart.h);
  }
  ctx.restore();

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += GRAVITY * 0.4 * dt; p.life -= p.decay;
    const radius = Math.max(0.1, p.size * p.life);
    if (!Number.isNaN(radius) && Number.isFinite(radius) && radius > 0.1) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, radius, 0, Math.PI*2); ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Popups
  popups = popups.filter(p => p.life > 0);
  popups.forEach(p => {
    p.y += p.vy * dt; p.life -= dt * 1.5;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color; ctx.font = '900 24px Arial';
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

// ── 9. MAIN LOOP ─────────────────────────────────────────────────
let lastTs = performance.now();
function tick(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05); // Cap 50ms (20fps min) to prevent physics explosion
  lastTs = ts;

  ctx.save();

  // Camera FX
  if (camShake > 0) {
    ctx.translate((Math.random()-0.5)*camShake*20, (Math.random()-0.5)*camShake*20);
    camShake -= dt * 5;
  }
  if (Math.abs(camZoom - 1) > 0.001) {
    camZoom += (1 - camZoom) * dt * 10;
    ctx.translate(W/2, H/2); ctx.scale(camZoom, camZoom); ctx.translate(-W/2, -H/2);
  } else { camZoom = 1; }

  // Logic Update
  if (state === 'playing') {
    gameTime += dt;
    const currentSpeed = BASE_SPEED * speedMult;
    cameraX += currentSpeed * dt;
    score += speedMult * 15 * dt;

    // Speed Progression
    const ns = 1 + Math.floor(gameTime / 25) * 0.2;
    if (ns > speedMult) {
      speedMult = ns; speedLevel = Math.floor(speedMult * 10)/10;
      spawnParticles(player.x + 50, player.y - 50, '#fff', 15, 350);
      checkMissions();
    }

    // Combo
    if (comboTimer > 0) {
      comboTimer -= dt;
      if(comboTimer <= 0) { combo=0; document.getElementById('combo').style.opacity='0'; }
    }

    // Physics (Player)
    if (!player.onGround) {
      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;
      player.tilt = Math.max(-0.25, Math.min(0.2, player.vy * 0.0004));
      if (player.y >= BASELINE) {
        player.y = BASELINE; player.vy = 0; player.onGround = true; player.tilt = 0;
        player.squish = 0.6; // Squash landing
        spawnParticles(player.x + SPRITES.cart.w/2, BASELINE, '#8BC34A', 10, 150);
      }
    }
    player.squish += (1 - player.squish) * dt * 15; // Recover squash

    // Spawners & Cleanup
    while(obstacles.length < 5) spawnObstacle();
    while(pizzas.length < 4) spawnPizza();
    obstacles = obstacles.filter(o => o.x - cameraX > -200);
    pizzas = pizzas.filter(p => p.x - cameraX > -200 && !p.collected);

    // Collisions
    const pBox = player.getHitbox();
    for (const ob of obstacles) {
      const rX = ob.x - cameraX;
      if (rX > W || rX < -200) continue;
      const obBox = ob.getHitbox();
      obBox.x -= cameraX; // Ajuste para coord de tela
      if (rectOverlap(pBox, obBox)) { triggerDead(); break; }
    }

    if (state === 'playing') {
      pizzas.forEach(pz => {
        if(pz.collected) return;
        const rX = pz.x - cameraX;
        const pzBox = { x: rX - SPRITES.pizza.w/2, y: pz.y - SPRITES.pizza.h/2, w: SPRITES.pizza.w, h: SPRITES.pizza.h };
        if (rectOverlap(pBox, pzBox)) {
          pz.collected = true; pizzaCount++; pizzaTotal++; score += 100;
          sndCollect(); camZoom = 1.03;
          combo++; comboTimer = 2.5;
          const cEl = document.getElementById('combo');
          if(combo >= 2) { cEl.textContent = `COMBO x${combo} 🔥`; cEl.style.opacity='1'; }
          spawnParticles(pzBox.x+24, pzBox.y+24, '#f39c12', 15, 200);
          spawnPopup(pzBox.x+24, pzBox.y-20, combo>=2?`+${combo*100}`:'+100', '#f1c40f');
          checkMissions();
        }
      });
    }

    // Update HUD
    document.getElementById('hp-v').textContent = `🍕 ${pizzaCount}`;
    document.getElementById('hs-v').textContent = Math.floor(score).toLocaleString();
    document.getElementById('hb-v').textContent = Math.floor(bestScore).toLocaleString();
    document.getElementById('hv-v').textContent = speedMult.toFixed(1) + 'x';
  }

  render(dt);
  ctx.restore();
  requestAnimationFrame(tick);
}

// ── 10. INPUT & BOOT ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); unlockAC(); jump(); }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); unlockAC(); jump(); }, {passive:false});
canvas.addEventListener('mousedown', () => { unlockAC(); jump(); });

document.getElementById('btn-start').addEventListener('click', () => {
  unlockAC(); document.getElementById('start-screen').style.display='none'; resetGame();
});
document.getElementById('btn-restart').addEventListener('click', () => {
  unlockAC(); document.getElementById('gameover-screen').style.display='none'; resetGame();
});

// Init
loadAllAssets().then(() => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  initScenery();
  state = 'start';
  requestAnimationFrame(tick);
});
</script>
</body>
